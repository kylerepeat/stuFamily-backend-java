spring:
  datasource:
    url: jdbc:h2:mem:stufamily_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  h2:
    console:
      enabled: true
  sql:
    init:
      mode: never

app:
  security:
    jwt:
      issuer: stuFamily-test
      secret: "TestJwtSecretForIntegrationTestingAtLeast32Chars"
      access-expire-seconds: 7200
  wechat:
    miniapp:
      app-id: "test-app-id"
      secret: "test-secret"
    pay:
      app-id: "test-app-id"
      mch-id: "test-mchid"
      mch-key: "test-mch-key"
      notify-url: "http://localhost:8080/api/weixin/pay/notify"
      mock-create-order-enabled: true
      mock-notify-enabled: true

logging:
  level:
    com.stufamily.backend: DEBUG
