server:
  port: 0

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: none
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-test.sql
      data-locations: classpath:data-test.sql

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    root: WARN
    com.stufamily.backend: INFO

app:
  security:
    jwt:
      issuer: stuFamily-test
      secret: "TestSecretKeyForJwtTokenMustBeAtLeast32CharsLong!!"
      access-expire-seconds: 7200
      refresh-expire-seconds: 604800
  wechat:
    miniapp:
      app-id: "test-app-id"
      secret: "test-secret"
      msg-data-format: JSON
    pay:
      app-id: "test-miniapp-appid"
      mch-id: "test-mchid"
      mch-key: "test-mch-key"
      notify-url: "https://test-domain.com/api/weixin/pay/notify"
      mock-create-order-enabled: true
      mock-notify-enabled: true
